version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: urlshortener-postgres
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: harshraj
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: urlshortener-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: